[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
force = false
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
ignored_error_codes = [2424, 4591]
fs_permissions = [
    { access = 'read-write', path = 'deployments/' },
    { access = 'read', path = 'deploy-config/' },
    { access = 'read', path = 'broadcast/' },
    { access = 'read', path = 'script/' },
]

# 测试配置 - 不使用 viaIR（避免 Stack Too Deep）
[profile.test]
via_ir = false
optimizer = true
fs_permissions = [
    { access = 'read-write', path = 'deployments/' },
    { access = 'read', path = 'deploy-config/' },
    { access = 'read', path = 'broadcast/' },
    { access = 'read', path = 'script/' },
]

# Skip external library test files
skip = [
    "lib/openzeppelin-contracts-upgradeable/test/**",
    "lib/openzeppelin-contracts/test/**"
]

verbosity = 2
ffi = false
remappings = [
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[profile.default.fuzz]
runs = 1000
max_test_rejects = 65536
seed = '0x3e8'
dictionary_weight = 40
include_storage = true
include_push_bytes = true

[profile.intense]
fuzz = { runs = 10000 }

# Network configuration
[rpc_endpoints]
base_sepolia = "https://sepolia.base.org"
base = "https://mainnet.base.org"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=84532", chain = 84532 }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=8453", chain = 8453 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options